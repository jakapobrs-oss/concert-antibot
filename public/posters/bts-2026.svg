      <stop offset="0" stop-color="#12081f"/>
      <stop offset="0.55" stop-color="#3b1a6e"/>
      <stop offset="1" stop-color="#7b2ff7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.38" r="0.55">
      <stop offset="0" stop-color="#c9a6ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c9a6ff" stop-opacity="0"/>
