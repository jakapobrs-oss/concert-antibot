<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <!-- โปสเตอร์สาธิต (ข้อมูล demo ในเครื่อง) — งานพิมพ์ตัวอักษรล้วน ไม่ใช้ภาพ/โลโก้จริง -->
  <defs>
