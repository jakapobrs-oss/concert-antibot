    <circle cx="620" cy="180" r="2"/><circle cx="260" cy="210" r="2"/>
    <circle cx="810" cy="260" r="2.5"/><circle cx="90" cy="300" r="2"/>
  </g>
  <text x="450" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="190" font-weight="800" fill="#ffffff" letter-spacing="14">BTS</text>
  <text x="450" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="600" fill="#e4d3ff" letter-spacing="22">WORLD TOUR</text>
  <rect x="285" y="428" width="330" height="58" rx="29" fill="none" stroke="#cfa9ff" stroke-width="2"/>
  <text x="450" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="8">BANGKOK 2026</text>
  <text x="450" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#bfa1f0" letter-spacing="4">RAJAMANGALA NATIONAL STADIUM · 15 AUG 2026</text>
